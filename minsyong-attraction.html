<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EX4HL59KV2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-EX4HL59KV2');
    </script>

    <!-- =====================================================
         【組員必改 1/3】SEO Metadata
         ・title：建議 30–60 字元，格式：核心關鍵字｜CCU Chiayi Guide
         ・description：建議 80–160 字元，自然描述頁面內容
         ・canonical：換成此頁實際 URL，例如：
           https://ccu-chiayi-guide.site/food.html
    ===================================================== -->
    <title>頁面標題｜CCU Chiayi Guide</title>
    <meta
      name="description"
      content="民雄景點整理，包括旺來山、民雄金桔觀光工廠、KHTOY絨毛玩偶旗艦館、嘉義酒類文物館等等，推薦給中正大學學生及嘉義旅客。"
    />
    <link rel="canonical" href="https://ccu-chiayi-guide.site/minsyong-attraction.html" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/ccu-school-emblem.png" />
    <link rel="apple-touch-icon" href="/images/ccu-school-emblem.png" />

    <!-- Bootstrap 5 CSS（僅 CSS，不載入 Bootstrap JS） -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />

    <!-- 全站 CSS（載入順序不可更動） -->
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />

    <!-- =====================================================
         【組員必改 2/3】頁面專用 CSS
         ・檔名依頁名命名，例如：food.css、traffic.css
         ・僅放本頁獨有樣式，共用元件樣式請加入 components.css
    ===================================================== -->
    <link rel="stylesheet" href="/css/pages/PAGE.css" />

    <!-- =====================================================
         【組員必改 3/3】JSON-LD Structured Data
         ・WebPage：更新 name、description、url
         ・BreadcrumbList：依實際層數調整 itemListElement
           - 二層（首頁 / 本頁）：保留兩筆 ListItem
           - 三層（首頁 / 分類 / 本頁）：新增第二筆並填入分類頁 URL
         ・Schema 內容必須與頁面可見文字一致，不得捏造
    ===================================================== -->
    <script type="application/ld+json">
      [
        {
          "@context": "https://schema.org",
          "@type": "WebPage",
          "name": "頁面標題｜CCU Chiayi Guide",
          "description": "頁面描述，與 meta description 保持一致。",
          "url": "https://ccu-chiayi-guide.site/PAGE.html",
          "inLanguage": "zh-TW",
          "isPartOf": {
            "@type": "WebSite",
            "url": "https://ccu-chiayi-guide.site"
          }
        },
        {
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "首頁",
              "item": "https://ccu-chiayi-guide.site/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "目前頁面名稱",
              "item": "https://ccu-chiayi-guide.site/PAGE.html"
            }
          ]
        }
      ]
    </script>
  </head>

  <body>
    <div class="site-wrapper">
      <!-- 固定導覽列（Sticky Header）-->
      <div class="sticky-header-wrap sticky-top">
        <header class="site-header" role="banner">
          <div class="header-inner">
            <a href="/" class="site-logo" aria-label="CCU Chiayi Guide 首頁">
              <img
                src="/images/ccu-chiayi-logo.png"
                alt="CCU Chiayi Guide 網站標誌"
                class="logo-emblem"
                width="36"
                height="36"
              />
              <span class="logo-text">
                CCU Chiayi Guide
                <span class="logo-sub">中正大學新生與嘉義生活指南</span>
              </span>
            </a>

            <button
              class="nav-toggle"
              aria-label="開啟導覽選單"
              aria-expanded="false"
              aria-controls="site-nav"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </header>

        <!-- 主要導覽
             【組員提醒】將本頁對應的 <a> 加上 aria-current="page"
             例如：<a href="food.html" aria-current="page">美食</a>
        -->
        <nav class="site-nav" id="site-nav" aria-label="主要導覽">
          <ul>
            <li><a href="/">首頁</a></li>
            <li><a href="/food.html">美食</a></li>
            <li><a href="/traffic.html">交通</a></li>
            <li><a href="/chiayi.html" aria-current="page">嘉義</a></li>
          </ul>
        </nav>
      </div>
      <!-- /.sticky-header-wrap（固定區塊結束） -->

      <!-- =====================================================
           麵包屑導覽（非固定，隨頁面自然滾動離開螢幕）
           ・此區塊刻意置於 sticky wrapper 之外，不加任何 sticky 樣式
           ・修改說明：
             - 二層（首頁 / 本頁）：保留下方兩個 <li> 即可
             - 三層（首頁 / 分類 / 本頁）：在兩者之間插入：
               <li class="breadcrumb-item"><a href="/category.html">分類名稱</a></li>
             - 將 "目前頁面名稱" 換成實際頁面名稱
             - 記得同步更新 <head> 內的 BreadcrumbList JSON-LD
      ===================================================== -->
      <nav aria-label="麵包屑導覽" class="breadcrumb-nav container py-2">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="/">首頁</a></li>
          <!-- 若有中間分類層，於此處新增一個 breadcrumb-item -->
          <li class="breadcrumb-item active" aria-current="page">
            民雄景點推薦
          </li>
        </ol>
      </nav>
      <!-- /麵包屑導覽 -->

      <!-- =====================================================
           主內容區塊（兩欄 RWD 佈局）
           ・site-main：專案 layout.css 的 max-width 與版面間距
           ・container py-0：Bootstrap 響應式容器與垂直留白
           ・id="main-content"：供無障礙跳轉錨點使用
           ・內部使用 Bootstrap row 建立兩欄架構：
             左欄 col-md-3 → TOC 側欄（桌機 sticky，手機橫向捲動）
             右欄 col-md-9 → 主要圖文內容
      ===================================================== -->
      <main class="site-main container py-0" id="main-content">
        <div class="row align-items-start">
          <!-- ===================================================
               注意：row 必須保留 align-items-start
               ・Bootstrap row 預設將欄高撐滿，會讓 aside sticky 失效
               ・align-items-start 使 aside 保持自然高度，sticky 才能運作
          =================================================== -->

          <!-- =====================================================
               TOC 側欄（左欄）
               ・col-12：手機版佔滿整行，顯示在內文上方
               ・col-md-2：桌機版佔 2 格寬，與麵包屑左緣對齊
               ・sticky-md-top：Bootstrap 5 響應式 sticky，
                 只在 md（≥768px）以上生效；手機版自然流動，不固定
               ・align-self-md-start：防止側欄被撐滿父欄高度（sticky 必要條件）
               ・style="top: 140px"：讓側欄錯開頂部固定導覽列的高度
                 （header + nav 兩層合計約 140px，與 scroll-padding-top 保持一致）
          ===================================================== -->
          <aside
            class="col-12 col-md-2 sticky-md-top align-self-md-start"
            style="top: 140px"
          >
            <!-- ===============================================
                 頁內目錄導覽（TOC）
                 ・d-flex flex-column align-items-stretch：
                   所有斷點一律由上而下排列，每個膠囊獨佔一列
                   align-items-stretch 使膠囊撐滿側欄寬度，文字置中
                 【組員提醒】href 必須與右欄 <section id="..."> 保持同步
            =============================================== -->
            <span class="d-block small text-muted mb-1 text-center"
              >快速搜尋</span
            >
            <nav
              class="d-flex flex-column align-items-stretch toc-nav"
              aria-label="頁內目錄"
            >
              <!-- 【組員填寫 TOC 連結】將下方換成實際章節名稱，href 對應右欄 section id -->
              <a
                href="#section-1"
                class="btn btn-sm btn-outline-success rounded-pill m-2"
                >民雄介紹</a
              >
              <a
                href="#section-2"
                class="btn btn-sm btn-outline-success rounded-pill m-2"
                >旺來山</a
              >
              <a
                href="#section-3"
                class="btn btn-sm btn-outline-success rounded-pill m-2"
                >民雄金桔觀光工廠</a
              >
              <a
                href="#section-4"
                class="btn btn-sm btn-outline-success rounded-pill m-2"
                >KHTOY絨毛玩偶旗艦館</a
              >
              <a
                href="#section-5"
                class="btn btn-sm btn-outline-success rounded-pill m-1"
                >嘉義酒類文物館</a
              >
            </nav>
          </aside>
          <!-- /TOC 側欄 -->

          <!-- =====================================================
               主要圖文內容（右欄）
               ・col-12：手機版佔滿整行
               ・col-md-10：桌機版佔 10 格寬（搭配左欄 col-md-2，合計 12）
          ===================================================== -->
          <article class="col-12 col-md-10">
            <!-- ===============================================
                 【組員從這裡開始填寫內容】

                 規定：
                 ・每頁只能有一個 <h1>，不得省略
                 ・<h1> 必須包含本頁核心關鍵字
                 ・標題層級依結構遞進：h1 → h2 → h3，不得跳層
                 ・重要文字必須直接寫在 HTML 中，不得只靠 JS 產生
                 ・<section id="..."> 的 id 必須與左欄 TOC href 一致
            =============================================== -->

            <h1>民雄景點推薦</h1>

            <!-- 子章節範例（可複製多份，id 需與左欄 TOC href 對應） -->
            <section class="content-section" id="section-1">
              <h2>子章節標題</h2>
              <p>段落內容...</p>
            </section>

            <!-- 更多內容區塊請繼續往下擴展 -->
          </article>
          <!-- /主要圖文內容 -->
        </div>
        <!-- /.row -->
      </main>
      <!-- /主內容區塊 -->

      <!-- 回到頂部按鈕（由 js/main.js 的 initBackToTop() 控制顯示） -->
      <button class="back-to-top" aria-label="回到頂端">&#8679;</button>

      <!-- =====================================================
           全站頁尾（各頁保持一致，請勿修改此區塊）
      ===================================================== -->
      <footer class="site-footer" aria-label="頁尾">
        <div class="footer-inner">
          <p class="footer-desc">
            CCU Chiayi Guide 是一個以 SEO/SEM 課程為核心的靜態網站，
            整理中正大學新生與嘉義旅客需要的實用在地資訊。
          </p>
          <nav class="footer-nav" aria-label="頁尾導覽">
            <ul>
              <li><a href="/">首頁</a></li>
              <li><a href="/food.html">美食指南</a></li>
              <li><a href="/traffic.html">交通指南</a></li>
              <li><a href="/chiayi.html">嘉義指南</a></li>
            </ul>
          </nav>
          <p class="footer-copyright">
            © 2026 CCU Chiayi Guide.
            本站內容以真實在地資訊為準，不捏造店家資料。
          </p>
        </div>
      </footer>
      <!-- /頁尾 -->
    </div>
    <!-- /.site-wrapper -->

    <!-- 全站共用 JS（手機導覽、回到頂部、平滑捲動）-->
    <script src="/js/main.js" defer></script>

    <!-- 頁面專用 JS（若本頁有互動功能再取消註解，檔名依頁名命名）-->
    <!-- <script src="/js/pages/PAGE.js" defer></script> -->
  </body>
</html>
